<section class="calc-card patient-context-card" id="patientContextPanel" data-report-section="patient-context" aria-labelledby="patientContextTitle">
  <div class="calc-card-header">
    <span class="bar" aria-hidden="true"></span>
    <h2 id="patientContextTitle">Dados do paciente <span class="patient-context-badge">localStorage</span></h2>
  </div>
  <p class="patient-context-hint" id="patientContextStatus">Preencha e os dados ficam salvos neste navegador (Chrome).</p>
  <div class="patient-context-grid">
    <div class="field-row">
      <label class="field-label" for="patientName">Nome</label>
      <input type="text" id="patientName" class="field-input" placeholder="Ex.: Maria S. Oliveira" autocomplete="name" />
    </div>
    <div class="field-row">
      <label class="field-label" for="patientReg">Registro / prontuário</label>
      <input type="text" id="patientReg" class="field-input" placeholder="Ex.: 2026-004821" />
    </div>
    <div class="field-row">
      <label class="field-label" for="patientAge">Idade</label>
      <input type="text" id="patientAge" class="field-input" placeholder="Ex.: 0 dias" />
    </div>
    <div class="field-row">
      <label class="field-label" for="patientBed">Leito / setor</label>
      <input type="text" id="patientBed" class="field-input" placeholder="Ex.: Sala de parto • Berçário" />
    </div>
  </div>
  <div class="patient-context-actions">
    <button type="button" class="btn btn-outline-navy btn-sm" id="patientContextClear">Limpar dados salvos</button>
  </div>
</section>
