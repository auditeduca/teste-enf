<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Educação Infantil | Calculadoras de Enfermagem</title>
<meta name="description" content="Educação em saúde para crianças — histórias interativas, educação de higiene e desenhos para colorir.">
<link rel="canonical" href="https://www.calculadorasdeenfermagem.com.br/educacao-infantil.html" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site-styles.css">
<style>
  .kids-container{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
  .kids-hero{text-align:center;margin-bottom:32px;padding:40px 24px;background:linear-gradient(135deg,var(--navy-900),var(--blue-600));border-radius:24px;color:#fff;}
  .kids-hero h1{font-size:32px;font-family:'Sora',sans-serif;margin-bottom:10px;}
  .kids-hero p{font-size:15px;opacity:.9;max-width:600px;margin:0 auto;line-height:1.6;}
  .kids-hero-emoji{font-size:48px;margin-bottom:12px;}

  .kids-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;}
  .kids-tab{padding:12px 24px;border-radius:14px;border:2px solid var(--line);background:#fff;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s;display:flex;align-items:center;gap:8px;}
  .kids-tab:hover{border-color:var(--blue-400);color:var(--blue-600);}
  .kids-tab.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600);}

  .kids-view{display:none;}
  .kids-view.active{display:block;}

  /* Histórias */
  .kids-hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
  .kids-hist-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .15s;}
  .kids-hist-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
  .kids-hist-cover{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;}
  .kids-hist-body{padding:16px;}
  .kids-hist-body h3{font-size:15px;font-weight:700;color:var(--navy-900);margin-bottom:6px;}
  .kids-hist-meta{font-size:12px;color:var(--muted);}
  .kids-hist-meta span{margin-right:10px;}

  /* Story reader */
  .kids-reader{display:none;position:fixed;inset:0;background:rgba(8,21,39,.92);z-index:9999;padding:20px;align-items:center;justify-content:center;}
  .kids-reader.open{display:flex;}
  .kids-reader-book{background:#fff;border-radius:24px;max-width:600px;width:100%;padding:32px;position:relative;max-height:90vh;overflow-y:auto;}
  .kids-reader-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:none;background:var(--bg-soft);cursor:pointer;font-size:18px;color:var(--muted);}
  .kids-reader-close:hover{background:var(--line);}
  .kids-reader-illust{width:120px;height:120px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:56px;}
  .kids-reader-text{font-size:18px;line-height:1.8;color:var(--navy-900);text-align:center;margin-bottom:24px;font-family:'Manrope',sans-serif;}
  .kids-reader-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .kids-reader-btn{padding:12px 24px;border-radius:12px;border:none;background:var(--blue-600);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;}
  .kids-reader-btn:disabled{opacity:.3;cursor:default;}
  .kids-reader-btn:hover:not(:disabled){background:var(--blue-500);}
  .kids-reader-progress{text-align:center;font-size:12px;color:var(--muted);font-weight:700;}
  .kids-reader-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
  .kids-reader-dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:all .15s;}
  .kids-reader-dot.active{background:var(--blue-600);width:24px;border-radius:99px;}

  /* Coloring */
  .kids-des-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
  .kids-des-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .15s;}
  .kids-des-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
  .kids-des-svg{height:180px;display:flex;align-items:center;justify-content:center;background:#fff;padding:12px;}
  .kids-des-svg svg{max-width:100%;max-height:100%;}
  .kids-des-body{padding:12px;text-align:center;}
  .kids-des-body h3{font-size:13px;font-weight:700;color:var(--navy-900);margin-bottom:6px;}
  .kids-des-btn{padding:6px 16px;border-radius:8px;background:var(--blue-600);color:#fff;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Manrope',sans-serif;}
  .kids-des-btn:hover{background:var(--blue-500);}

  /* Hygiene */
  .kids-hig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .kids-hig-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;overflow:hidden;}
  .kids-hig-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .kids-hig-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .kids-hig-card h3{font-size:15px;font-weight:700;color:var(--navy-900);}
  .kids-hig-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .kids-hig-steps{margin:0 0 14px 20px;}
  .kids-hig-steps li{font-size:13px;color:var(--navy-800);margin-bottom:6px;line-height:1.5;}
  .kids-hig-when{padding:10px 14px;background:var(--bg-soft);border-radius:10px;font-size:12px;color:var(--muted);}
  .kids-hig-when strong{color:var(--navy-900);}

  @media(max-width:640px){
    .kids-hero{padding:24px 16px;}
    .kids-hero h1{font-size:24px;}
    .kids-hero-emoji{font-size:36px;}
    .kids-reader-text{font-size:16px;}
  }
</style>
</head>
<body data-page="educacao-infantil">
<a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
<div id="site-header"></div>
<div id="site-a11y"></div>

<main id="main-content">
  <div class="kids-container">
    <div class="kids-hero">
      <div class="kids-hero-emoji">🧒🧼🎨</div>
      <h1>Educação Infantil em Saúde</h1>
      <p>Histórias interativas, educação de higiene e desenhos para colorir — ensinando crianças a cuidarem da saúde de forma divertida!</p>
    </div>

    <div class="kids-tabs">
      <button class="kids-tab active" data-kids-tab="historias">📚 Histórias</button>
      <button class="kids-tab" data-kids-tab="higiene">🧼 Educação de Higiene</button>
      <button class="kids-tab" data-kids-tab="desenhos">🎨 Desenhos para Colorir</button>
    </div>

    <!-- HISTÓRIAS -->
    <div class="kids-view active" id="kids-historias">
      <div class="kids-hist-grid" id="histGrid"></div>
    </div>

    <!-- HIGIENE -->
    <div class="kids-view" id="kids-higiene">
      <div class="kids-hig-grid" id="higGrid"></div>
    </div>

    <!-- DESENHOS -->
    <div class="kids-view" id="kids-desenhos">
      <div class="kids-des-grid" id="desGrid"></div>
    </div>
  </div>
</main>

<!-- Story Reader Modal -->
<div class="kids-reader" id="kidsReader">
  <div class="kids-reader-book">
    <button class="kids-reader-close" id="readerClose">✕</button>
    <div class="kids-reader-illust" id="readerIllust"></div>
    <div class="kids-reader-text" id="readerText"></div>
    <div class="kids-reader-nav">
      <button class="kids-reader-btn" id="readerPrev">← Anterior</button>
      <div class="kids-reader-progress"><span id="readerPage">1</span> / <span id="readerTotal">8</span>
        <div class="kids-reader-dots" id="readerDots"></div>
      </div>
      <button class="kids-reader-btn" id="readerNext">Próximo →</button>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<div id="site-cookie"></div>

<script src="js/partials-loader.js"></script>
<script src="js/i18n-loader.js"></script>
<script src="js/kids-data.js"></script>
<script>
const K = window.KIDS_DATA;
const EMOJI_MAP = {nurse:'👩‍⚕️',hands:'👐',soap:'🧼',bubbles:'🫧',rub:'🤲',clean:'✨',stars:'⭐',tooth:'🦷',brush:'🪥',sad-tooth:'😢',cavity:'🐛',happy-tooth:'😁',dentist:'🦷',smile:'😊',boy:'👦',vaccine:'💉',hero:'🦸',pinch:'😮',badge:'🏅',play:'🧸',classroom:'🏫',heart:'❤️',fruits:'🍎🍊',tired:'😔',plate:'🍽️',rainbow-plate:'🌈',eating:'😋',strong-heart:'💪',happy-girl:'👧'};

// Tab switching
document.querySelectorAll('.kids-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.kids-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.kids-view').forEach(v => v.classList.remove('active'));
    document.getElementById('kids-' + this.dataset.kidsTab).classList.add('active');
  });
});

// Render histórias
document.getElementById('histGrid').innerHTML = K.historias.map(h =>
  '<div class="kids-hist-card" data-hist="'+h.id+'">'+
    '<div class="kids-hist-cover" style="background:linear-gradient(135deg,'+h.color+'22,'+h.color+'44)">'+(EMOJI_MAP[h.pages[0].illust]||'📖')+'</div>'+
    '<div class="kids-hist-body"><h3>'+h.title+'</h3>'+
    '<div class="kids-hist-meta"><span>'+h.theme+'</span><span>'+h.ageRange+'</span><span>'+h.duration+'</span></div></div>'+
  '</div>'
).join('');

document.querySelectorAll('[data-hist]').forEach(card => {
  card.addEventListener('click', function() {
    const hist = K.historias.find(h => h.id === this.dataset.hist);
    openReader(hist);
  });
});

// Story reader
let readerHist = null, readerPage = 0;
function openReader(hist) {
  readerHist = hist;
  readerPage = 0;
  document.getElementById('readerTotal').textContent = hist.pages.length;
  renderReaderPage();
  // Dots
  document.getElementById('readerDots').innerHTML = hist.pages.map((_,i) => '<div class="kids-reader-dot'+(i===0?' active':'')+'"></div>').join('');
  document.getElementById('kidsReader').classList.add('open');
}

function renderReaderPage() {
  const p = readerHist.pages[readerPage];
  const emoji = EMOJI_MAP[p.illust] || '📖';
  document.getElementById('readerIllust').innerHTML = emoji;
  document.getElementById('readerIllust').style.background = readerHist.color + '22';
  document.getElementById('readerText').textContent = p.text;
  document.getElementById('readerPage').textContent = readerPage + 1;
  document.getElementById('readerPrev').disabled = readerPage === 0;
  document.getElementById('readerNext').disabled = readerPage === readerHist.pages.length - 1;
  document.querySelectorAll('.kids-reader-dot').forEach((d, i) => d.classList.toggle('active', i === readerPage));
}

document.getElementById('readerPrev').addEventListener('click', () => { if (readerPage > 0) { readerPage--; renderReaderPage(); } });
document.getElementById('readerNext').addEventListener('click', () => { if (readerPage < readerHist.pages.length - 1) { readerPage++; renderReaderPage(); } });
document.getElementById('readerClose').addEventListener('click', () => document.getElementById('kidsReader').classList.remove('open'));
document.getElementById('kidsReader').addEventListener('click', (e) => { if (e.target.id === 'kidsReader') document.getElementById('kidsReader').classList.remove('open'); });

// Render higiene
document.getElementById('higGrid').innerHTML = K.higiene.map(h =>
  '<div class="kids-hig-card">'+
    '<div class="kids-hig-header"><div class="kids-hig-icon" style="background:'+h.color+'22">'+(h.id==='hig-001'?'🧼':h.id==='hig-002'?'🪥':h.id==='hig-003'?'🚿':'😷')+'</div>'+
    '<div><h3>'+h.title+'</h3><div class="kids-hig-meta">⏱ '+h.duration+'</div></div></div>'+
    '<ol class="kids-hig-steps">'+h.steps.map(s=>'<li>'+s+'</li>').join('')+'</ol>'+
    '<div class="kids-hig-when"><strong>Quando fazer:</strong> '+h.when.join(' · ')+'</div>'+
  '</div>'
).join('');

// SVG outlines for coloring
function coloringSVG(type) {
  const svgs = {
    'nurse-stetho': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="60" r="28" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M80 88 Q80 120 100 120 Q120 120 120 88" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M90 120 L90 150 M110 120 L110 150" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M100 88 Q100 100 80 110 Q60 120 60 140" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M100 88 Q100 100 120 110 Q140 120 140 140" fill="none" stroke="#1a3e74" stroke-width="2.5"/><circle cx="60" cy="145" r="12" fill="none" stroke="#1a3e74" stroke-width="2.5"/><circle cx="140" cy="145" r="12" fill="none" stroke="#1a3e74" stroke-width="2.5"/></svg>',
    'hands-clean': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M70 100 Q70 70 85 70 L85 50 Q85 42 92 42 Q99 42 99 50 L99 70 L105 70 L105 45 Q105 37 112 37 Q119 37 119 45 L119 70 L125 70 L125 55 Q125 47 132 47 Q139 47 139 55 L139 80 Q139 120 120 130 L90 130 Q70 120 70 100 Z" fill="none" stroke="#1a3e74" stroke-width="2.5"/><circle cx="100" cy="155" r="15" fill="none" stroke="#1a3e74" stroke-width="2"/><text x="100" y="160" text-anchor="middle" font-size="14" fill="#1a3e74">✨</text></svg>',
    'tooth-happy': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M100 40 Q70 40 65 70 Q60 100 70 130 Q75 150 85 150 Q90 150 92 130 L108 130 Q110 150 115 150 Q125 150 130 130 Q140 100 135 70 Q130 40 100 40 Z" fill="none" stroke="#1a3e74" stroke-width="2.5"/><circle cx="88" cy="80" r="4" fill="#1a3e74"/><circle cx="112" cy="80" r="4" fill="#1a3e74"/><path d="M85 100 Q100 115 115 100" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'hospital': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="60" width="120" height="100" fill="none" stroke="#1a3e74" stroke-width="2.5"/><rect x="90" y="80" width="20" height="40" fill="none" stroke="#1a3e74" stroke-width="2.5"/><rect x="80" y="90" width="40" height="20" fill="none" stroke="#1a3e74" stroke-width="2.5"/><rect x="55" y="140" width="20" height="20" fill="none" stroke="#1a3e74" stroke-width="2"/><rect x="125" y="140" width="20" height="20" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M30 60 L170 60 L160 40 L40 40 Z" fill="none" stroke="#1a3e74" stroke-width="2.5"/></svg>',
    'vaccine-hero': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="70" r="25" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M75 95 L75 140 M125 95 L125 140 M75 95 L125 95" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M100 95 L100 130" fill="none" stroke="#1a3e74" stroke-width="2.5"/><rect x="130" y="50" width="8" height="30" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M138 80 L150 90 L145 95 L133 85 Z" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M70 50 L60 40 L55 45 L65 55 Z" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'plate-rainbow': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="60" fill="none" stroke="#1a3e74" stroke-width="2.5"/><circle cx="100" cy="100" r="45" fill="none" stroke="#1a3e74" stroke-width="2"/><circle cx="80" cy="85" r="12" fill="none" stroke="#1a3e74" stroke-width="2"/><circle cx="115" cy="90" r="10" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M75 110 Q100 120 125 110" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M85 115 L85 125 M100 120 L100 128 M115 115 L115 125" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'heart': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M100 160 C60 120 40 90 40 70 C40 50 55 40 70 40 C85 40 95 50 100 60 C105 50 115 40 130 40 C145 40 160 50 160 70 C160 90 140 120 100 160 Z" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M80 80 L90 90 L80 100" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M120 80 L110 90 L120 100" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'toothbrush': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><rect x="30" y="90" width="100" height="20" rx="10" fill="none" stroke="#1a3e74" stroke-width="2.5"/><rect x="130" y="85" width="40" height="30" rx="5" fill="none" stroke="#1a3e74" stroke-width="2.5"/><line x1="135" y1="85" x2="135" y2="70" stroke="#1a3e74" stroke-width="2"/><line x1="142" y1="85" x2="142" y2="70" stroke="#1a3e74" stroke-width="2"/><line x1="149" y1="85" x2="149" y2="70" stroke="#1a3e74" stroke-width="2"/><line x1="156" y1="85" x2="156" y2="70" stroke="#1a3e74" stroke-width="2"/><line x1="163" y1="85" x2="163" y2="70" stroke="#1a3e74" stroke-width="2"/></svg>',
    'animal-hospital': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="70" cy="80" r="20" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M55 65 L50 55 M85 65 L90 55" fill="none" stroke="#1a3e74" stroke-width="2"/><circle cx="65" cy="78" r="3" fill="#1a3e74"/><circle cx="75" cy="78" r="3" fill="#1a3e74"/><path d="M62 88 Q70 92 78 88" fill="none" stroke="#1a3e74" stroke-width="2"/><rect x="110" y="70" width="60" height="50" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M135 80 L135 110 M120 95 L150 95" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'doctor-nurse': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="65" cy="55" r="20" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M50 75 L50 130 M80 75 L80 130 M50 75 L80 75" fill="none" stroke="#1a3e74" stroke-width="2.5"/><circle cx="135" cy="55" r="20" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M120 75 L120 130 M150 75 L150 130 M120 75 L150 75" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M135 35 L135 45 M130 40 L140 40" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'water-drop': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M100 30 C70 70 60 100 60 120 C60 145 80 160 100 160 C120 160 140 145 140 120 C140 100 130 70 100 30 Z" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M85 110 Q85 130 100 130" fill="none" stroke="#1a3e74" stroke-width="2"/></svg>',
    'mask': '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M50 80 Q50 70 60 70 L140 70 Q150 70 150 80 L150 120 Q150 140 100 150 Q50 140 50 120 Z" fill="none" stroke="#1a3e74" stroke-width="2.5"/><path d="M50 85 L30 85 M30 85 Q25 100 30 115 L50 115" fill="none" stroke="#1a3e74" stroke-width="2"/><path d="M150 85 L170 85 M170 85 Q175 100 170 115 L150 115" fill="none" stroke="#1a3e74" stroke-width="2"/><line x1="70" y1="95" x2="130" y2="95" stroke="#1a3e74" stroke-width="1.5"/><line x1="70" y1="105" x2="130" y2="105" stroke="#1a3e74" stroke-width="1.5"/><line x1="70" y1="115" x2="130" y2="115" stroke="#1a3e74" stroke-width="1.5"/></svg>',
  };
  return svgs[type] || svgs['heart'];
}

document.getElementById('desGrid').innerHTML = K.desenhos.map(d =>
  '<div class="kids-des-card" data-des="'+d.id+'">'+
    '<div class="kids-des-svg">'+coloringSVG(d.svg)+'</div>'+
    '<div class="kids-des-body"><h3>'+d.title+'</h3>'+
    '<span style="font-size:10px;color:var(--muted);display:block;margin-bottom:8px;">'+d.theme+'</span>'+
    '<button class="kids-des-btn" onclick="printDrawing(\''+d.svg+'\')">📄 Imprimir</button></div>'+
  '</div>'
).join('');

function printDrawing(svgType) {
  const svg = coloringSVG(svgType);
  const w = window.open('', '_blank');
  w.document.write('<html><head><title>Desenho para Colorir</title></head><body style="display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;"><div style="width:80%;max-width:500px;">'+svg.replace(/viewBox="0 0 200 200"/,'viewBox="0 0 200 200" width="100%" height="100%"')+'</div></body></html>');
  w.document.close();
  setTimeout(() => { w.print(); }, 300);
}
window.printDrawing = printDrawing;
</script>
</body>
</html>
