<head>

<style>
  /* ===== Simulados — estilos específicos da ferramenta ===== */
  .sim-container{max-width:840px; margin:0 auto; padding:24px 16px 60px;}
  .sim-header{text-align:center; margin-bottom:28px;}
  .sim-header h1{font-size:28px; font-family:'Sora',sans-serif; color:var(--navy-900); margin-bottom:6px;}
  .sim-header p{font-size:14px; color:var(--muted);}
  .sim-toolbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:24px; flex-wrap:wrap;}
  .sim-select{padding:10px 16px; border:1px solid var(--line); border-radius:10px; font-family:'Manrope',sans-serif; font-size:13px; color:var(--ink); background:#fff; cursor:pointer; min-width:200px;}
  .sim-progress-wrap{display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); font-weight:700;}
  .sim-progress-bar{width:120px; height:8px; background:var(--bg-soft); border-radius:99px; overflow:hidden;}
  .sim-progress-fill{height:100%; background:var(--blue-600); border-radius:99px; transition:width .3s; width:0%;}
  .sim-card{background:#fff; border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-md); overflow:hidden;}
  .sim-scenario{padding:28px;}
  .sim-scenario-tag{display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:99px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px;}
  .sim-scenario-tag.normal{background:var(--blue-100); color:var(--blue-600);}
  .sim-scenario-tag.moderate{background:#fff3e0; color:#ea580c;}
  .sim-scenario-tag.critical{background:#fee2e2; color:#dc2626;}
  .sim-scenario-text{font-size:15px; line-height:1.7; color:var(--navy-800); margin-bottom:20px;}
  .sim-scenario-text strong{color:var(--navy-900);}
  .sim-params{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px;}
  .sim-param{background:var(--bg-soft); border-radius:12px; padding:14px; text-align:center;}
  .sim-param-label{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:6px;}
  .sim-param-value{font-size:13px; font-weight:700; color:var(--navy-900);}
  .sim-question{font-size:16px; font-weight:700; color:var(--navy-900); margin-bottom:16px; font-family:'Sora',sans-serif;}
  .sim-options{display:grid; gap:10px;}
  .sim-option{padding:16px 20px; border:2px solid var(--line); border-radius:12px; font-size:14px; font-weight:600; color:var(--navy-800); cursor:pointer; transition:all .15s; text-align:left; background:#fff; font-family:'Manrope',sans-serif; display:flex; align-items:center; gap:12px;}
  .sim-option:hover{border-color:var(--blue-400); background:var(--blue-100);}
  .sim-option .opt-marker{width:28px; height:28px; border-radius:8px; background:var(--bg-soft); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--muted); flex-shrink:0;}
  .sim-option.selected{border-color:var(--blue-600); background:var(--blue-100);}
  .sim-option.selected .opt-marker{background:var(--blue-600); color:#fff;}
  .sim-option.correct{border-color:#16a34a; background:#f0fdf4;}
  .sim-option.correct .opt-marker{background:#16a34a; color:#fff;}
  .sim-option.incorrect{border-color:#dc2626; background:#fef2f2;}
  .sim-option.incorrect .opt-marker{background:#dc2626; color:#fff;}
  .sim-option.disabled{pointer-events:none; opacity:.7;}
  .sim-feedback{padding:24px 28px; border-top:1px solid var(--line); background:var(--bg-soft); display:none;}
  .sim-feedback.is-visible{display:block;}
  .sim-feedback-title{font-size:14px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .sim-feedback-title.correct{color:#16a34a;}
  .sim-feedback-title.incorrect{color:#dc2626;}
  .sim-feedback-text{font-size:13px; line-height:1.6; color:var(--navy-800); margin-bottom:12px;}
  .sim-feedback-nnn{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-top:12px;}
  .sim-feedback-nnn .nnn-box{background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px;}
  .sim-feedback-nnn .nnn-label{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:4px;}
  .sim-feedback-nnn .nnn-text{font-size:12px; font-weight:600; color:var(--navy-900); line-height:1.5;}
  .sim-actions{padding:20px 28px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .sim-score{font-size:13px; font-weight:700; color:var(--muted);}
  .sim-score strong{color:var(--navy-900); font-size:18px;}
  .sim-result{padding:40px 28px; text-align:center; display:none;}
  .sim-result.is-visible{display:block;}
  .sim-result-score{font-size:48px; font-weight:800; font-family:'Sora',sans-serif; color:var(--navy-900); margin-bottom:8px;}
  .sim-result-label{font-size:14px; color:var(--muted); margin-bottom:20px;}
  .sim-result-breakdown{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; max-width:500px; margin:0 auto 24px;}
  .sim-result-stat{background:var(--bg-soft); border-radius:12px; padding:16px;}
  .sim-result-stat-val{font-size:24px; font-weight:800; color:var(--navy-900);}
  .sim-result-stat-lbl{font-size:11px; color:var(--muted); font-weight:600;}
  .btn-retry{padding:12px 28px; border-radius:10px; background:var(--blue-600); color:#fff; border:none; font-family:'Manrope',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:background .15s;}
  .btn-retry:hover{background:var(--blue-500);}
  .sim-empty{text-align:center; padding:60px 20px; color:var(--muted);}
  .sim-empty h2{font-size:18px; color:var(--navy-900); margin-bottom:8px;}
  .sim-empty p{font-size:13px; margin-bottom:20px;}
  @media(max-width:640px){
    .sim-params{grid-template-columns:repeat(2,1fr);}
    .sim-toolbar{flex-direction:column; align-items:stretch;}
    .sim-select{width:100%;}
  }
</style>
</head>

<main class="sim-container">

// ════════════════════════════════════════════════════════════════════
// SIMULADOS — Motor data-driven que consome os mesmos dados da calculadora
// Arquitetura: Banco → JSON da calculadora → Simulados (ferramenta)
// ════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════════
let state = {
  topic: 'apgar',
  currentIdx: 0,
  answered: [],
  score: 0,
  started: false
};

// Load progress from localStorage
function loadProgress(topic) {
  const key = 'sim_progress_' + topic;
  const saved = localStorage.getItem(key);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return null;
}

function saveProgress(topic, data) {
  localStorage.setItem('sim_progress_' + topic, JSON.stringify(data));
}

// ════════════════════════════════════════════════════════════════════
// Render
// ════════════════════════════════════════════════════════════════════
function renderScenario() {
  const topicData = SIM_DATA[state.topic];
  if (!topicData || !topicData.scenarios.length) {
    document.getElementById('simContent').innerHTML = '<div class="sim-empty"><h2>Nenhum simulado disponível</h2><p>Esta ferramenta ainda não tem cenários cadastrados.</p></div>';
    return;
  }

  const scenario = topicData.scenarios[state.currentIdx];
  const total = topicData.scenarios.length;
  const progress = ((state.currentIdx) / total) * 100;

  document.getElementById('simProgressText').textContent = (state.currentIdx + 1) + ' / ' + total;
  document.getElementById('simProgressFill').style.width = progress + '%';

  const wasAnswered = state.answered[state.currentIdx];
  const userAnswer = wasAnswered ? wasAnswered.optionIdx : null;

  let html = '<div class="sim-card">';
  html += '<div class="sim-scenario">';
  html += '<span class="sim-scenario-tag ' + scenario.tag + '">' + scenario.tagLabel + '</span>';
  html += '<p class="sim-scenario-text">' + scenario.text + '</p>';
  html += '<div class="sim-params">';
  for (const [key, val] of Object.entries(scenario.params)) {
    html += '<div class="sim-param"><div class="sim-param-label">' + key + '</div><div class="sim-param-value">' + val + '</div></div>';
  }
  html += '</div>';
  html += '<p class="sim-question">' + scenario.question + '</p>';
  html += '<div class="sim-options">';
  scenario.options.forEach((opt, i) => {
    let cls = 'sim-option';
    if (userAnswer !== null) {
      cls += ' disabled';
      if (i === userAnswer) {
        cls += opt.correct ? ' correct' : ' incorrect';
      } else if (opt.correct) {
        cls += ' correct';
      }
    }
    html += '<button class="' + cls + '" data-idx="' + i + '" type="button">';
    html += '<span class="opt-marker">' + String.fromCharCode(65 + i) + '</span>';
    html += '<span>' + opt.label + '</span>';
    html += '</button>';
  });
  html += '</div>';
  html += '</div>';

  // Feedback
  if (userAnswer !== null) {
    const isCorrect = scenario.options[userAnswer].correct;
    const fb = scenario.feedback;
    html += '<div class="sim-feedback is-visible">';
    html += '<div class="sim-feedback-title ' + (isCorrect ? 'correct' : 'incorrect') + '">';
    html += '<svg class="icon" style="width:18px;height:18px"><use href="#' + (isCorrect ? 'i-check' : 'i-warning') + '"/></svg>';
    html += isCorrect ? 'Resposta correta!' : 'Resposta incorreta';
    html += '</div>';
    html += '<p class="sim-feedback-text">' + (isCorrect ? fb.correct : fb.incorrect) + '</p>';
    html += '<div class="sim-feedback-nnn">';
    html += '<div class="nnn-box"><div class="nnn-label">NANDA-I</div><div class="nnn-text">' + fb.nanda + '</div></div>';
    html += '<div class="nnn-box"><div class="nnn-label">NIC</div><div class="nnn-text">' + fb.nic + '</div></div>';
    html += '<div class="nnn-box"><div class="nnn-label">NOC</div><div class="nnn-text">' + fb.noc + '</div></div>';
    html += '</div>';
    html += '</div>';

    // Actions
    html += '<div class="sim-actions">';
    html += '<div class="sim-score">Pontuação: <strong>' + state.score + '</strong> / ' + total + '</div>';
    if (state.currentIdx < total - 1) {
      html += '<button class="btn-retry" id="simNextBtn" type="button">Próximo cenário <svg class="icon" style="width:16px;height:16px;display:inline;vertical-align:middle"><use href="#i-arrow"/></svg></button>';
    } else {
      html += '<button class="btn-retry" id="simFinishBtn" type="button">Ver resultado <svg class="icon" style="width:16px;height:16px;display:inline;vertical-align:middle"><use href="#i-arrow"/></svg></button>';
    }
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('simContent').innerHTML = html;

  // Bind events
  document.querySelectorAll('.sim-option:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx, 10);
      answerQuestion(idx);
    });
  });

  const nextBtn = document.getElementById('simNextBtn');
  if (nextBtn) nextBtn.addEventListener('click', nextScenario);

  const finishBtn = document.getElementById('simFinishBtn');
  if (finishBtn) finishBtn.addEventListener('click', showResult);
}

function answerQuestion(optionIdx) {
  const topicData = SIM_DATA[state.topic];
  const scenario = topicData.scenarios[state.currentIdx];
  const isCorrect = scenario.options[optionIdx].correct;

  state.answered[state.currentIdx] = { optionIdx, correct: isCorrect };
  if (isCorrect) state.score++;

  saveProgress(state.topic, { answered: state.answered, score: state.score, currentIdx: state.currentIdx });
  renderScenario();
}

function nextScenario() {
  state.currentIdx++;
  renderScenario();
}

function showResult() {
  const topicData = SIM_DATA[state.topic];
  const total = topicData.scenarios.length;
  const correct = state.score;
  const incorrect = total - correct;
  const pct = Math.round((correct / total) * 100);

  let label = '';
  if (pct >= 80) label = 'Excelente! Você dominou os cenários clínicos.';
  else if (pct >= 60) label = 'Bom desempenho. Revise os cenários com erro.';
  else if (pct >= 40) label = 'Desempenho regular. Estude mais os conceitos.';
  else label = 'Continue praticando. Revise a teoria e tente novamente.';

  let html = '<div class="sim-card">';
  html += '<div class="sim-result is-visible">';
  html += '<div class="sim-result-score">' + pct + '%</div>';
  html += '<div class="sim-result-label">' + label + '</div>';
  html += '<div class="sim-result-breakdown">';
  html += '<div class="sim-result-stat"><div class="sim-result-stat-val">' + correct + '</div><div class="sim-result-stat-lbl">Acertos</div></div>';
  html += '<div class="sim-result-stat"><div class="sim-result-stat-val">' + incorrect + '</div><div class="sim-result-stat-lbl">Erros</div></div>';
  html += '<div class="sim-result-stat"><div class="sim-result-stat-val">' + total + '</div><div class="sim-result-stat-lbl">Cenários</div></div>';
  html += '</div>';
  html += '<button class="btn-retry" id="simRetryBtn" type="button"><svg class="icon" style="width:16px;height:16px;display:inline;vertical-align:middle"><use href="#i-refresh"/></svg> Refazer simulado</button>';
  html += '</div>';
  html += '</div>';

  document.getElementById('simContent').innerHTML = html;
  document.getElementById('simProgressText').textContent = total + ' / ' + total;
  document.getElementById('simProgressFill').style.width = '100%';

  document.getElementById('simRetryBtn').addEventListener('click', function() {
    state.currentIdx = 0;
    state.answered = [];
    state.score = 0;
    saveProgress(state.topic, { answered: [], score: 0, currentIdx: 0 });
    renderScenario();
  });

  // Save to history
  const histKey = 'sim_history_' + state.topic;
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(histKey)) || []; } catch(e) {}
  hist.push({ date: new Date().toISOString(), score: correct, total: total, pct: pct });
  localStorage.setItem(histKey, JSON.stringify(hist));
}

// Topic selector
document.getElementById('simTopicSelect').addEventListener('change', function() {
  state.topic = this.value;
  state.currentIdx = 0;
  state.answered = [];
  state.score = 0;
  const saved = loadProgress(state.topic);
  if (saved) {
    state.answered = saved.answered || [];
    state.score = saved.score || 0;
    state.currentIdx = saved.currentIdx || 0;
  }
  if (SIM_DATA[state.topic] && SIM_DATA[state.topic].scenarios.length) {
    renderScenario();
  } else {
    document.getElementById('simContent').innerHTML = '<div class="sim-empty"><h2>Simulado em breve</h2><p>Esta ferramenta ainda não tem cenários cadastrados para este tópico.</p></div>';
  }
});

// Init — load saved progress or start fresh
const saved = loadProgress(state.topic);
if (saved) {
  state.answered = saved.answered || [];
  state.score = saved.score || 0;
  state.currentIdx = saved.currentIdx || 0;
}
renderScenario();
</script>
</body>
</html>
