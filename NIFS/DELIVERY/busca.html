<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busca | Calculadoras de Enfermagem</title>
<meta name="description" content="Busque calculadoras clínicas, escalas de avaliação e ferramentas de enfermagem.">
<link rel="canonical" href="https://www.calculadorasdeenfermagem.com.br/busca.html" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="css/site-styles.css">
<style>
  #site-header:empty{display:block;min-height:118px}
  #site-footer:empty{display:block;min-height:320px;background:var(--navy-900,#1a3e74)}
  .search-hero{background:linear-gradient(135deg,var(--navy-950),var(--navy-900) 55%,var(--blue-600));padding:40px 0 36px;border-radius:0 0 24px 24px;margin-bottom:28px;}
  .search-hero h1{color:#fff;font-family:'Sora',sans-serif;font-size:clamp(24px,4vw,32px);margin-bottom:8px;}
  .search-hero p{color:rgba(255,255,255,.82);font-size:14px;margin-bottom:20px;}
  .search-form{max-width:560px;position:relative;}
  .search-form input{width:100%;height:52px;border:none;border-radius:14px;padding:0 20px 0 48px;font:inherit;font-size:15px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,.12);}
  .search-form input:focus{outline:2px solid var(--blue-400);box-shadow:0 0 0 4px rgba(37,99,235,.2);}
  .search-form .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--muted);}
  .search-meta{display:flex;gap:16px;flex-wrap:wrap;margin:20px 0 8px;font-size:13px;color:var(--muted);}
  .search-meta strong{color:var(--navy-900);}
  .search-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .search-filters button{padding:8px 14px;border-radius:99px;border:1px solid var(--line);background:#fff;font:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
  .search-filters button:hover{border-color:var(--blue-400);color:var(--blue-600);}
  .search-filters button.active{background:var(--blue-600);border-color:var(--blue-600);color:#fff;}
  .search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .search-card{display:block;padding:20px;background:#fff;border:1px solid var(--line);border-radius:14px;text-decoration:none;color:inherit;transition:transform .15s,box-shadow .15s,border-color .15s;}
  .search-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--blue-400);}
  .search-card .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;background:var(--blue-100);color:var(--blue-600);}
  .search-card h2{font-size:16px;color:var(--navy-900);margin-bottom:6px;font-family:'Sora',sans-serif;line-height:1.35;}
  .search-card p{font-size:13px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .search-empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .search-empty h2{font-size:18px;color:var(--navy-900);margin-bottom:8px;}
</style>
</head>
<body data-page="busca">
<a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
<div id="site-header"></div>
<div id="site-a11y"></div>
<main id="main-content">
  <section class="search-hero">
    <div class="container">
      <h1>Buscar ferramentas</h1>
      <p>Encontre calculadoras, escalas clínicas e recursos de enfermagem.</p>
      <form class="search-form" id="searchForm" role="search">
        <svg class="icon" aria-hidden="true"><use href="#i-search"/></svg>
        <input type="search" name="q" id="searchInput" placeholder="Ex.: Glasgow, IMC, Braden, dor…" autocomplete="off" aria-label="Termo de busca">
      </form>
    </div>
  </section>
  <div class="container" style="padding-bottom:60px">
    <div class="search-meta" id="searchMeta" hidden></div>
    <div class="search-filters" id="searchFilters" role="group" aria-label="Filtrar por tipo">
      <button type="button" class="active" data-filter="todos">Todos</button>
      <button type="button" data-filter="calculadora">Calculadoras</button>
      <button type="button" data-filter="escala">Escalas</button>
      <button type="button" data-filter="catalogo">Catálogos</button>
      <button type="button" data-filter="simulado">Simulados</button>
    </div>
    <div class="search-grid" id="searchResults" aria-live="polite"></div>
    <div class="search-empty" id="searchEmpty" hidden>
      <h2>Nenhum resultado encontrado</h2>
      <p>Tente outro termo ou explore o <a href="mapa-do-site.html">mapa do site</a>.</p>
    </div>
  </div>
</main>
<div id="site-footer"></div>
<div id="site-cookie"></div>
<script src="js/partials-loader.js"></script>
<script src="js/busca.js"></script>
</body>
</html>
