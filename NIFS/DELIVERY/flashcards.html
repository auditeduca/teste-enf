<style>
  /* ===== Flashcards — estilos específicos da ferramenta ===== */
  .fc-container{max-width:840px; margin:0 auto; padding:24px 16px 60px;}
  .fc-header{text-align:center; margin-bottom:28px;}
  .fc-header h1{font-size:28px; font-family:'Sora',sans-serif; color:var(--navy-900); margin-bottom:6px;}
  .fc-header p{font-size:14px; color:var(--muted);}

  /* Toolbar */
  .fc-toolbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:24px; flex-wrap:wrap;}
  .fc-filters{display:flex; gap:8px; flex-wrap:wrap;}
  .fc-filter{padding:8px 16px; border:1px solid var(--line); border-radius:99px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; background:#fff; font-family:'Manrope',sans-serif; transition:all .15s;}
  .fc-filter:hover{border-color:var(--blue-400); color:var(--blue-600);}
  .fc-filter.active{background:var(--blue-600); color:#fff; border-color:var(--blue-600);}
  .fc-progress{font-size:12px; font-weight:700; color:var(--muted); display:flex; align-items:center; gap:8px;}
  .fc-progress strong{color:var(--navy-900); font-size:16px;}

  /* Card area */
  .fc-card-area{perspective:1200px; min-height:360px; display:flex; align-items:center; justify-content:center; margin-bottom:24px;}
  .fc-card{width:100%; max-width:640px; min-height:320px; position:relative; transform-style:preserve-3d; transition:transform .5s cubic-bezier(0.4,0,0.2,1); cursor:pointer;}
  .fc-card.is-flipped{transform:rotateY(180deg);}
  .fc-face{position:absolute; inset:0; backface-visibility:hidden; border-radius:16px; box-shadow:var(--shadow-md); padding:32px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;}
  .fc-front{background:#fff; border:1px solid var(--line);}
  .fc-back{background:var(--bg-soft); border:1px solid var(--line); transform:rotateY(180deg);}
  .fc-category{display:inline-flex; align-items:center; gap:6px; padding:4px 14px; border-radius:99px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px; background:var(--blue-100); color:var(--blue-600);}
  .fc-question{font-size:22px; font-weight:700; color:var(--navy-900); font-family:'Sora',sans-serif; line-height:1.4; margin-bottom:16px;}
  .fc-hint{font-size:12px; color:var(--muted); margin-top:auto;}
  .fc-answer{font-size:16px; font-weight:600; color:var(--navy-900); line-height:1.6; margin-bottom:14px;}
  .fc-detail{font-size:13px; color:var(--muted); line-height:1.6; text-align:left; width:100%; background:#fff; border-radius:10px; padding:14px; border:1px solid var(--line);}
  .fc-detail strong{color:var(--navy-900);}
  .fc-flip-icon{position:absolute; top:16px; right:16px; opacity:.3;}

  /* Controls */
  .fc-controls{display:flex; gap:12px; justify-content:center; margin-bottom:24px;}
  .fc-btn{padding:12px 24px; border-radius:10px; font-family:'Manrope',sans-serif; font-weight:700; font-size:14px; cursor:pointer; border:2px solid; transition:all .15s; display:flex; align-items:center; gap:8px;}
  .fc-btn-review{background:#fff; border-color:#ea580c; color:#ea580c;}
  .fc-btn-review:hover{background:#fff3e0;}
  .fc-btn-known{background:#fff; border-color:#16a34a; color:#16a34a;}
  .fc-btn-known:hover{background:#f0fdf4;}
  .fc-btn-skip{background:#fff; border-color:var(--line); color:var(--muted);}
  .fc-btn-skip:hover{background:var(--bg-soft);}

  /* Session stats */
  .fc-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px;}
  .fc-stat{background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; text-align:center;}
  .fc-stat-val{font-size:24px; font-weight:800; color:var(--navy-900); font-family:'Sora',sans-serif;}
  .fc-stat-lbl{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}

  /* Deck complete */
  .fc-complete{background:#fff; border:1px solid var(--line); border-radius:16px; padding:40px; text-align:center; box-shadow:var(--shadow-md);}
  .fc-complete h2{font-size:22px; color:var(--navy-900); font-family:'Sora',sans-serif; margin-bottom:8px;}
  .fc-complete p{font-size:14px; color:var(--muted); margin-bottom:20px;}
  .fc-complete-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:400px; margin:0 auto 24px;}
  .fc-restart{padding:12px 28px; border-radius:10px; background:var(--blue-600); color:#fff; border:none; font-family:'Manrope',sans-serif; font-weight:700; font-size:14px; cursor:pointer;}
  .fc-restart:hover{background:var(--blue-500);}

  /* Empty */
  .fc-empty{text-align:center; padding:60px 20px; color:var(--muted);}
  .fc-empty h2{font-size:18px; color:var(--navy-900); margin-bottom:8px;}

  @media(max-width:640px){
    .fc-stats{grid-template-columns:repeat(2,1fr);}
    .fc-filters{justify-content:center;}
    .fc-toolbar{flex-direction:column; align-items:stretch;}
    .fc-question{font-size:18px;}
    .fc-answer{font-size:14px;}
  }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════════════
// FLASHCARDS — Motor data-driven que consome os mesmos dados da calculadora
// Arquitetura: Banco → JSON da calculadora → Flashcards (ferramenta)
// Dados: NANDA-I, NIC, NOC, interpretação, segurança — mesmo JSON da calc
// ════════════════════════════════════════════════════════════════════

const FC_DATA = {
  apgar: [
    // NANDA
    { id: "fc-n1", cat: "nanda", catLabel: "NANDA-I",
      q: "Qual o diagnóstico NANDA-I para um recém-nascido com ventilação inadequada (respiração ausente ou irregular)?",
      a: "Padrão respiratório ineficaz (00032)",
      detail: "Inspiração e/ou expiração que não proporciona ventilação adequada. Relacionado ao escore de Apgar baixo, especialmente nos parâmetros de esforço respiratório e frequência cardíaca." },
    { id: "fc-n2", cat: "nanda", catLabel: "NANDA-I",
      q: "Qual diagnóstico NANDA-I se aplica a um RN com risco de variação nos níveis de glicose sanguínea?",
      a: "Risco de nível de glicemia instável (00179)",
      detail: "Vulnerabilidade a variação nos níveis de glicose/açúcar no sangue, o que pode comprometer a saúde do recém-nascido. Comum em RNs de baixo peso ou prematuros." },

    // NIC
    { id: "fc-i1", cat: "nic", catLabel: "NIC",
      q: "Qual a intervenção NIC para cuidados imediatos ao recém-nascido logo após o parto?",
      a: "Cuidados ao recém-nascido: imediatos (NIC 3250)",
      detail: "Inclui: secar e aquecer o RN, avaliar Apgar no 1º e 5º minuto, aspirar vias aéreas se necessário, realizar contato pele a pele, clampeamento do cordão." },
    { id: "fc-i2", cat: "nic", catLabel: "NIC",
      q: "Qual a intervenção NIC para reanimação neonatal quando o Apgar é muito baixo?",
      a: "Reanimação neonatal (NIC 3254)",
      detail: "Inclui: ventilação com pressão positiva, compressões torácicas se FC < 60 bpm, administração de adrenalina, intubação se necessário. Equipe de reanimação deve estar presente." },
    { id: "fc-i3", cat: "nic", catLabel: "NIC",
      q: "Qual a intervenção NIC para monitorização contínua do recém-nascido após reanimação?",
      a: "Monitorização dos sinais vitais (NIC 3350)",
      detail: "Monitorar FC, FR, saturação, temperatura e padrão respiratório. Reavaliar Apgar a cada 5 minutos se escore < 7. Documentar todas as intervenções." },

    // NOC
    { id: "fc-o1", cat: "noc", catLabel: "NOC",
      q: "Qual o resultado esperado (NOC) relacionado à respiração do recém-nascido?",
      a: "Status respiratório do recém-nascido (NOC 0413)",
      detail: "Indicadores: frequência respiratória adequada, ausência de cianose, choro vigoroso, padrão respiratório regular. Avaliado em conjunto com o escore de Apgar." },
    { id: "fc-o2", cat: "noc", catLabel: "NOC",
      q: "Qual o resultado esperado (NOC) sobre a adaptação do RN à vida extrauterina?",
      a: "Adaptação do recém-nascido à vida extrauterina (NOC 0415)",
      detail: "Indicadores: estabilidade térmica, estabilidade cardiorrespiratória, reflexos presentes, tônus muscular adequado, coloração da pele normal." },

    // Interpretação
    { id: "fc-int1", cat: "interpretation", catLabel: "Interpretação",
      q: "O que significa um Apgar de 0 a 3?",
      a: "Gravemente Deprimido",
      detail: "Recém-nascido gravemente deprimido. Requer manobras de reanimação neonatal imediatas. Conduta: reanimação neonatal imediata, ventilação com pressão positiva, considerar intubação, equipe de reanimação presente." },
    { id: "fc-int2", cat: "interpretation", catLabel: "Interpretação",
      q: "O que significa um Apgar de 4 a 6?",
      a: "Moderadamente Deprimido",
      detail: "Pode necessitar de estimulação, oxigênio suplementar ou ventilação assistida. Conduta: estimulação tátil, O₂ suplementar se indicado, monitorização contínua, reavaliar no 5º minuto." },
    { id: "fc-int3", cat: "interpretation", catLabel: "Interpretação",
      q: "O que significa um Apgar de 7 a 10?",
      a: "Normal / Boa Vitalidade",
      detail: "Recém-nascido com boa vitalidade ao nascer. Conduta: cuidados de rotina, contato pele a pele, clampeamento oportuno do cordão, monitorização de rotina." },
    { id: "fc-int4", cat: "interpretation", catLabel: "Interpretação",
      q: "Quando o Apgar deve ser reavaliado após o 5º minuto?",
      a: "A cada 5 minutos até 20 minutos, se o escore permanecer < 7",
      detail: "Repetir a avaliação a cada 5 minutos (10º, 15º, 20º minuto) se o escore permanecer abaixo de 7. Documentar cada escore separadamente. Não usar o Apgar isoladamente para prever prognóstico neurológico." },

    // Segurança
    { id: "fc-s1", cat: "safety", catLabel: "Segurança",
      q: "Qual a regra de ouro sobre reanimação vs. cálculo do Apgar?",
      a: "NUNCA atrase a reanimação para calcular o Apgar",
      detail: "A reanimação tem prioridade absoluta. O Apgar é uma ferramenta de avaliação, não de triagem para decisão de reanimar. Se o RN não respira e está cianótico, inicie reanimação imediatamente." },
    { id: "fc-s2", cat: "safety", catLabel: "Segurança",
      q: "Qual o mnemônico para lembrar os 5 parâmetros do Apgar?",
      a: "A-P-G-A-R: Aparência, Pulso, Gesticulação, Atividade, Respiração",
      detail: "Aparência = cor da pele; Pulso = frequência cardíaca; Gesticulação = irritabilidade reflexa; Atividade = tônus muscular; Respiração = esforço respiratório. Cada parâmetro recebe score 0, 1 ou 2." },
    { id: "fc-s3", cat: "safety", catLabel: "Segurança",
      q: "O Apgar substitui a gasometria de cordão umbilical?",
      a: "Não — são avaliações complementares",
      detail: "A gasometria de cordão fornece informação objetiva sobre o equilíbrio ácido-base, enquanto o Apgar é uma avaliação clínica rápida da vitalidade. Ambas devem ser usadas em conjunto para avaliação completa." }
  ],

  // Placeholder for future calculadoras
  glasgow: [],
  braden: []
};

// ════════════════════════════════════════════════════════════════════
// State — spaced repetition via localStorage
// ════════════════════════════════════════════════════════════════════
let fcState = {
  topic: 'apgar',
  filter: 'all',
  queue: [],
  currentIdx: 0,
  flipped: false,
  stats: { known: 0, review: 0, new: 0, total: 0 }
};

function loadCardStates(topic) {
  const key = 'fc_states_' + topic;
  try { return JSON.parse(localStorage.getItem(key)) || {}; } catch(e) { return {}; }
}

function saveCardState(topic, cardId, status) {
  const key = 'fc_states_' + topic;
  let states = {};
  try { states = JSON.parse(localStorage.getItem(key)) || {}; } catch(e) {}
  states[cardId] = { status: status, lastReviewed: new Date().toISOString() };
  localStorage.setItem(key, JSON.stringify(states));
}

function buildQueue() {
  const allCards = FC_DATA[fcState.topic] || [];
  const states = loadCardStates(fcState.topic);

  let filtered = allCards;
  if (fcState.filter !== 'all') {
    filtered = allCards.filter(c => c.cat === fcState.filter);
  }

  // Sort: new cards first, then review, then known
  filtered.sort((a, b) => {
    const sa = states[a.id]?.status || 'new';
    const sb = states[b.id]?.status || 'new';
    const order = { new: 0, review: 1, known: 2 };
    return (order[sa] || 0) - (order[sb] || 0);
  });

  fcState.queue = filtered;
  fcState.currentIdx = 0;
  fcState.flipped = false;
  updateStats(states);
}

function updateStats(states) {
  const cards = FC_DATA[fcState.topic] || [];
  let known = 0, review = 0, isNew = 0;
  cards.forEach(c => {
    const s = states[c.id]?.status || 'new';
    if (s === 'known') known++;
    else if (s === 'review') review++;
    else isNew++;
  });
  fcState.stats = { known, review, new: isNew, total: cards.length };
  document.getElementById('fcStatTotal').textContent = cards.length;
  document.getElementById('fcStatKnown').textContent = known;
  document.getElementById('fcStatReview').textContent = review;
  document.getElementById('fcStatNew').textContent = isNew;
}

function renderCard() {
  const card = fcState.queue[fcState.currentIdx];
  if (!card) {
    renderComplete();
    return;
  }

  const total = fcState.queue.length;
  document.getElementById('fcProgress').innerHTML = 'Cartão <strong>' + (fcState.currentIdx + 1) + '</strong> / ' + total;
  document.getElementById('fcControls').style.display = 'flex';

  let html = '<div class="fc-card-area">';
  html += '<div class="fc-card' + (fcState.flipped ? ' is-flipped' : '') + '" id="fcCard">';

  // Front
  html += '<div class="fc-face fc-front">';
  html += '<svg class="icon fc-flip-icon" style="width:20px;height:20px"><use href="#i-rotate"/></svg>';
  html += '<span class="fc-category">' + card.catLabel + '</span>';
  html += '<p class="fc-question">' + card.q + '</p>';
  html += '<p class="fc-hint">Clique para virar o cartão</p>';
  html += '</div>';

  // Back
  html += '<div class="fc-face fc-back">';
  html += '<span class="fc-category">' + card.catLabel + '</span>';
  html += '<p class="fc-answer">' + card.a + '</p>';
  html += '<div class="fc-detail">' + card.detail + '</div>';
  html += '</div>';

  html += '</div>';
  html += '</div>';

  document.getElementById('fcContent').innerHTML = html;

  // Click to flip
  document.getElementById('fcCard').addEventListener('click', function() {
    fcState.flipped = !fcState.flipped;
    this.classList.toggle('is-flipped');
  });
}

function renderComplete() {
  const states = loadCardStates(fcState.topic);
  updateStats(states);
  document.getElementById('fcControls').style.display = 'none';
  document.getElementById('fcProgress').innerHTML = 'Cartão <strong>' + fcState.queue.length + '</strong> / ' + fcState.queue.length;

  let html = '<div class="fc-complete">';
  html += '<h2><svg class="icon" style="width:24px;height:24px;color:var(--blue-600);vertical-align:middle"><use href="#i-check"/></svg> Deck completo!</h2>';
  html += '<p>Você revisou todos os flashcards desta categoria.</p>';
  html += '<div class="fc-complete-stats">';
  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:#16a34a">' + fcState.stats.known + '</div><div class="fc-stat-lbl">Dominados</div></div>';
  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:#ea580c">' + fcState.stats.review + '</div><div class="fc-stat-lbl">Revisar</div></div>';
  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:var(--blue-600)">' + fcState.stats.new + '</div><div class="fc-stat-lbl">Novos</div></div>';
  html += '</div>';
  html += '<button class="fc-restart" id="fcRestartBtn" type="button"><svg class="icon" style="width:16px;height:16px;display:inline;vertical-align:middle"><use href="#i-refresh"/></svg> Estudar novamente</button>';
  html += '</div>';

  document.getElementById('fcContent').innerHTML = html;
  document.getElementById('fcRestartBtn').addEventListener('click', function() {
    buildQueue();
    renderCard();
  });
}

function nextCard() {
  fcState.currentIdx++;
  fcState.flipped = false;
  if (fcState.currentIdx >= fcState.queue.length) {
    renderComplete();
  } else {
    renderCard();
  }
}

// ════════════════════════════════════════════════════════════════════
// Event handlers
// ════════════════════════════════════════════════════════════════════
document.getElementById('fcKnownBtn').addEventListener('click', function() {
  const card = fcState.queue[fcState.currentIdx];
  if (card) saveCardState(fcState.topic, card.id, 'known');
  nextCard();
});

document.getElementById('fcReviewBtn').addEventListener('click', function() {
  const card = fcState.queue[fcState.currentIdx];
  if (card) saveCardState(fcState.topic, card.id, 'review');
  nextCard();
});

document.getElementById('fcSkipBtn').addEventListener('click', function() {
  nextCard();
});

// Filter buttons
document.querySelectorAll('.fc-filter').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fc-filter').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    fcState.filter = this.dataset.cat;
    buildQueue();
    renderCard();
  });
});

// Init
buildQueue();
renderCard();
</script>
</body>
</html>
