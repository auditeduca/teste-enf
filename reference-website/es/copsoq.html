<h1 id="copsoq">Questionário Psicossocial de Copenhagen II</h1>
<h2></h2>
O Copenhagen Psychosocial Questionnaire II (COPSOQ) é um instrumento fundamental para a avaliação da organização do trabalho e a gestão de riscos psicossociais e faz parte das ferramentas a ser adotadas pelo mundo corporativo para implementação e adequação da atualização da Norma Regulamentadora NR-1 que entrou em vigor este ano (2026).

Sobre la Aplicación del Cuestionario (Versión Larga)
</h3>

<p><strong>Formato:</strong> A Versão Longa é composta por 119 perguntas (profunda).</p>
<p><strong>Escala Likert:</strong> 5 opções de respostas pontuadas de 1 a 5.</p>
<p><strong>Tempo:</strong> O tempo médio de preenchimento é 15 a 25 minutos.</p>
<p><strong>Objetivo:</strong> Identificar estresse, burnout e qualidade da liderança.</p>

function calcularCOPSOQ() {

respondidas++;
}

}

// Populate print template from page data
function populatePrintTemplate() {
  if (toolName) document.getElementById('printToolName').textContent = toolName.textContent.trim();
  
  var toolCat = document.querySelector('.tool-header .subtitle, .tool-category');
  if (toolCat) document.getElementById('printToolCategory').textContent = toolCat.textContent.trim();
  
  // Date
  var now = new Date();
  var dateStr = now.toLocaleDateString('pt-BR') + ' - ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  var dateEl = document.getElementById('printDate');
  if (dateEl) dateEl.textContent = dateStr;
  
  // Patient data from localStorage
  try {
    var ctx = JSON.parse(localStorage.getItem('patientContext') || '{}');
    if (ctx.name) document.getElementById('printPatientName').textContent = ctx.name;
    if (ctx.reg) document.getElementById('printPatientReg').textContent = ctx.reg;
    if (ctx.age) document.getElementById('printPatientAge').textContent = ctx.age;
    if (ctx.bed) document.getElementById('printPatientBed').textContent = ctx.bed;
  } catch(e) {}
  
  // Parameters from calc inputs
  var paramsList = document.getElementById('printParamsList');
  if (paramsList) {
    var inputs = document.querySelectorAll('.calc-card input, .calc-card select, .calc-grid input, .calc-grid select');
    inputs.forEach(function(inp) {
      if (inp.value && inp.value !== '') {
        var label = inp.getAttribute('aria-label') || inp.getAttribute('placeholder') || inp.name || 'Parâmetro';
        var li = document.createElement('li');
        li.innerHTML = '<span class="param">' + label + '</span><span class="param">' + inp.value + '</span>';
        paramsList.appendChild(li);
      }
    });
  }
  
  // Score/classification from result
  var scoreEl = document.querySelector('.result-box .score, .result-value, .calc-result .score');
  if (scoreEl) document.getElementById('printScore').textContent = scoreEl.textContent.trim();
  
  var classEl = document.querySelector('.result-box .classification, .result-label, .calc-result .label');
  if (classEl) document.getElementById('printClassification').textContent = classEl.textContent.trim();
  
  var interpEl = document.querySelector('.result-box .interpretation, .result-text, .calc-result .interpretation');
  if (interpEl) document.getElementById('printInterpretation').textContent = interpEl.textContent.trim();
  
  // Reference
  var refEl = document.querySelector('.evidence-section .reference, .reference-text, .citation');
  if (refEl) document.getElementById('printReference').textContent = refEl.textContent.trim();
}
